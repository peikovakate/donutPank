spring.application.name=bank
server.servlet.context-path=/api

# File-based H2 so data survives restarts; AUTO_SERVER lets the H2 console
# connect concurrently with the running app for debugging.
spring.datasource.url=jdbc:h2:file:./data/bank;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.mvc.problemdetails.enabled=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLWRldi1vbmx5LWp3dC1zZWNyZXQtZG8tbm90LXVzZS1pbi1wcm9k}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}

app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:4200}

app.login.max-attempts=${LOGIN_MAX_ATTEMPTS:5}
app.login.lockout-minutes=${LOGIN_LOCKOUT_MINUTES:15}

app.external-call.base-url=${EXTERNAL_CALL_BASE_URL:https://httpstat.us}
app.external-call.timeout-ms=${EXTERNAL_CALL_TIMEOUT_MS:3000}

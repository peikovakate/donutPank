spring.application.name=bank

# File-based H2 so data survives restarts; AUTO_SERVER lets the H2 console
# connect concurrently with the running app for debugging.
spring.datasource.url=jdbc:h2:file:./data/bank;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
